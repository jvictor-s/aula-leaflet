<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
     integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
     crossorigin=""/>
     <!-- Make sure you put this AFTER Leaflet's CSS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
     integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
     crossorigin=""></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #map { height: 400px; width: 50%; }
    </style>
</head>
<body>
    
    <div id="form">
        <input id="input-local" type="text" placeHolder="digite um endereço">
        <button id="btn-buscar">Buscar</button>
    </div>

    <div id="map"></div>

    <script>
        let center  = [-6.8881, -38.5572];
        var map = L.map('map').setView(center, 15);

        let marker = L.marker(center,{
            draggable:true,
            icon: L.icon({
                iconUrl: 'https://cdn-icons-png.flaticon.com/512/504/504276.png',
                iconSize: [36, 36]
            })
        }).addTo(map);

        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
        }).addTo(map);

        map.locate({setView:true, maxZoom: 15});

        map.on('locationfound', e=>{
            marker.setLatLng(e.latlng);
        });

        const botao = document.getElementById('btn-buscar');
        const input = document.getElementById('input-local');

        botao.addEventListener('click', ()=>{
            fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${input.value}`)
                .then(response => response.json())
                .then(data => console.log(data[0]))
        });

    </script>

</body>
</html>
